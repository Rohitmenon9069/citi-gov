<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to CitiGov — India Citizen Trust Analytics Dashboard." />
  <title>Login — CitiGov</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- Shared App Styles -->
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ── LOGIN PAGE SPECIFIC STYLES ─────────────────────────── */
    .login-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 50%, #0c1e3d 100%);
      position: relative;
      overflow: hidden;
    }

    /* Decorative blobs */
    .login-bg::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -15%;
      width: 640px;
      height: 640px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30,64,175,.18) 0%, transparent 65%);
      pointer-events: none;
    }
    .login-bg::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -15%;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14,165,233,.13) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Card */
    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: rgba(16, 34, 64, 0.75);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius-xl);
      padding: 44px 40px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 64px rgba(0,0,0,.55), 0 0 0 1px rgba(14,165,233,.08);
      animation: fadeUp .45s cubic-bezier(.4,0,.2,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo / branding */
    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .login-brand-text {
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -.5px;
    }
    .login-brand-accent { color: var(--cyan); }

    /* Heading */
    .login-heading {
      font-size: 1.65rem;
      font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, var(--white) 30%, var(--cyan-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .login-subtext {
      font-size: .88rem;
      color: var(--gray-400);
      margin-bottom: 32px;
    }

    /* Form fields */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }
    .form-label {
      font-size: .82rem;
      font-weight: 600;
      color: var(--gray-300);
      letter-spacing: .02em;
    }
    .form-field-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .form-field-icon {
      position: absolute;
      left: 14px;
      color: var(--gray-500);
      pointer-events: none;
      display: flex;
    }
    .form-input {
      width: 100%;
      padding: 11px 14px 11px 42px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--gray-100);
      font-size: .92rem;
      font-family: var(--font-main);
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      outline: none;
    }
    .form-input::placeholder { color: var(--gray-600); }
    .form-input:focus {
      border-color: var(--cyan-light);
      background: rgba(14,165,233,.06);
      box-shadow: 0 0 0 3px rgba(14,165,233,.15);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: var(--gray-500);
      cursor: pointer;
      padding: 4px;
      display: flex;
      transition: color var(--transition);
    }
    .pw-toggle:hover { color: var(--cyan-light); }

    /* Forgot password */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -8px;
      margin-bottom: 24px;
    }
    .forgot-link {
      font-size: .78rem;
      color: var(--cyan-light);
      transition: opacity var(--transition);
    }
    .forgot-link:hover { opacity: .75; }

    /* Login button */
    .btn-login {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: var(--font-main);
      font-size: .95rem;
      font-weight: 700;
      color: var(--white);
      background: linear-gradient(135deg, var(--blue-mid), var(--cyan));
      box-shadow: 0 4px 18px rgba(37,99,235,.45);
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      letter-spacing: .02em;
      position: relative;
      overflow: hidden;
    }
    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,.08);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(37,99,235,.6);
    }
    .btn-login:hover::after { opacity: 1; }
    .btn-login:active { transform: translateY(0); }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--gray-600);
      font-size: .78rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,.08);
    }

    /* Social / SSO buttons */
    .sso-btn {
      width: 100%;
      padding: 11px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04);
      color: var(--gray-200);
      font-family: var(--font-main);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all var(--transition);
      margin-bottom: 10px;
    }
    .sso-btn:hover {
      background: rgba(255,255,255,.09);
      border-color: rgba(255,255,255,.2);
      color: var(--white);
      transform: translateY(-1px);
    }

    /* Footer text */
    .login-footer-text {
      text-align: center;
      font-size: .82rem;
      color: var(--gray-500);
      margin-top: 28px;
    }
    .login-footer-text a {
      color: var(--cyan-light);
      font-weight: 600;
      transition: opacity var(--transition);
    }
    .login-footer-text a:hover { opacity: .75; }

    /* Error message */
    .form-error {
      display: none;
      font-size: .78rem;
      color: var(--red);
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      margin-bottom: 16px;
    }
    .form-error.visible { display: block; }

    /* Success state */
    .login-success {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      padding: 12px 0;
    }
    .login-success.visible { display: flex; }
    .success-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(34,197,94,.15);
      border: 2px solid rgba(34,197,94,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0); }
      to   { transform: scale(1); }
    }
    .success-title { font-size: 1.1rem; font-weight: 700; color: var(--green); }
    .success-msg   { font-size: .85rem; color: var(--gray-400); }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card { padding: 32px 22px 28px; }
    }
  </style>
</head>
<body>
  <div class="login-bg" role="main">
    <div class="login-card" aria-label="Login form">

      <!-- Brand -->
      <div class="login-brand">
        <svg width="32" height="32" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="28" height="28" rx="8" fill="url(#lgLogoGrad)"/>
          <path d="M14 6L20 10V14C20 17.314 17.314 20 14 20C10.686 20 8 17.314 8 14V10L14 6Z" fill="white" opacity="0.9"/>
          <circle cx="14" cy="14" r="3" fill="url(#lgLogoGrad2)"/>
          <defs>
            <linearGradient id="lgLogoGrad" x1="0" y1="0" x2="28" y2="28">
              <stop offset="0%" stop-color="#1e40af"/>
              <stop offset="100%" stop-color="#0ea5e9"/>
            </linearGradient>
            <linearGradient id="lgLogoGrad2" x1="0" y1="0" x2="12" y2="12">
              <stop offset="0%" stop-color="#22d3ee"/>
              <stop offset="100%" stop-color="#a5f3fc"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="login-brand-text">Citi<span class="login-brand-accent">Gov</span></span>
      </div>

      <!-- Heading -->
      <h1 class="login-heading">Welcome back</h1>
      <p class="login-subtext">Sign in to access the India Digital Trust Analytics Dashboard</p>

      <!-- Login form -->
      <form id="loginForm" novalidate>

        <!-- Error banner -->
        <div class="form-error" id="loginError" role="alert">
          Invalid email or password. Please try again.
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email address</label>
          <div class="form-field-wrap">
            <span class="form-field-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input
              type="email"
              id="loginEmail"
              class="form-input"
              placeholder="you@example.gov.in"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="form-field-wrap">
            <span class="form-field-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="loginPassword"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button
              type="button"
              class="pw-toggle"
              id="pwToggle"
              aria-label="Show or hide password"
              title="Toggle password visibility"
            >
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Forgot password -->
        <div class="forgot-row">
          <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-login" id="loginBtn">
          Sign In to CitiGov
        </button>
      </form>

      <!-- Success state (shown after login) -->
      <div class="login-success" id="loginSuccess" aria-live="polite">
        <div class="success-icon">✓</div>
        <div class="success-title">Signed in successfully!</div>
        <div class="success-msg">Redirecting to dashboard…</div>
      </div>

      <!-- Divider -->
      <div class="divider">or continue with</div>

      <!-- SSO Options -->
      <button type="button" class="sso-btn" id="digilockerSso" aria-label="Sign in with DigiLocker">
        <!-- DigiLocker-style shield icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Sign in with DigiLocker
      </button>
      <button type="button" class="sso-btn" id="aadhaarSso" aria-label="Sign in with Aadhaar OTP">
        <!-- ID card icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="8" cy="12" r="2"/>
          <path d="M14 10h4M14 14h4"/>
        </svg>
        Sign in with Aadhaar OTP
      </button>

      <!-- Register link -->
      <p class="login-footer-text">
        Don't have an account? <a href="signup.html" id="registerLink">Create account</a>
      </p>
      <p class="login-footer-text" style="margin-top:8px;">
        <a href="index.html">← Back to Dashboard</a>
      </p>
    </div>
  </div>

  <script>
    // ── Password visibility toggle ────────────────────────────
    const pwInput  = document.getElementById('loginPassword');
    const pwToggle = document.getElementById('pwToggle');
    const eyeIcon  = document.getElementById('eyeIcon');

    const eyeOpenSVG   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeClosedSVG = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

    pwToggle.addEventListener('click', () => {
      const hidden = pwInput.type === 'password';
      pwInput.type = hidden ? 'text' : 'password';
      eyeIcon.innerHTML = hidden ? eyeClosedSVG : eyeOpenSVG;
      pwToggle.setAttribute('aria-label', hidden ? 'Hide password' : 'Show password');
    });

    // ── Account helpers (localStorage) ───────────────────────
    function getAccounts() {
      try { return JSON.parse(localStorage.getItem('citigov_accounts') || '[]'); }
      catch { return []; }
    }

    // ── Form submission ───────────────────────────────────────
    const form         = document.getElementById('loginForm');
    const loginBtn     = document.getElementById('loginBtn');
    const loginError   = document.getElementById('loginError');
    const loginSuccess = document.getElementById('loginSuccess');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      loginError.classList.remove('visible');

      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const pass  = document.getElementById('loginPassword').value;

      if (!email || !pass) {
        loginError.textContent = 'Please enter both email and password.';
        loginError.classList.add('visible');
        return;
      }

      loginBtn.textContent = 'Signing in…';
      loginBtn.disabled = true;

      setTimeout(() => {
        // Check built-in demo account first
        const isDemo = (email === 'admin@citigov.in' && pass === 'citigov2025');

        // Check user-created accounts stored in localStorage
        const accounts = getAccounts();
        const matched  = accounts.find(a => a.email === email && a.password === pass);

        if (isDemo || matched) {
          // Persist logged-in state
          localStorage.setItem('citigov_user', JSON.stringify({
            name : matched ? matched.name : 'Admin',
            email: email
          }));
          form.style.display = 'none';
          loginSuccess.classList.add('visible');
          setTimeout(() => { window.location.href = 'index.html'; }, 1500);
        } else {
          loginError.textContent = 'No account found with those credentials. Please check your details or create an account.';
          loginError.classList.add('visible');
          loginBtn.textContent = 'Sign In to CitiGov';
          loginBtn.disabled = false;
        }
      }, 800);
    });

    // ── SSO placeholders ──────────────────────────────────────
    document.getElementById('digilockerSso').addEventListener('click', () => {
      alert('DigiLocker SSO integration coming soon.');
    });
    document.getElementById('aadhaarSso').addEventListener('click', () => {
      alert('Aadhaar OTP login integration coming soon.');
    });

    // ── Forgot password ───────────────────────────────────────
    document.getElementById('forgotLink').addEventListener('click', (e) => {
      e.preventDefault();
      alert('Password reset link will be sent to your registered email.');
    });
  </script>
</body>
</html>
